<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng bài | SocialConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="app-body">

<nav class="navbar">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand"><span>🛡️</span> SocialConnect</a>
        <div class="nav-links">
            <a th:href="@{/home}" class="nav-link">🏠 Feed</a>
            <a th:href="@{/post/create}" class="nav-link active">✏️ Đăng bài</a>
            <sec:authorize access="hasRole('ADMIN')">
                <a th:href="@{/admin/dashboard}" class="nav-link admin-badge">⚙️ Admin</a>
            </sec:authorize>
            <div class="nav-user">
                <span sec:authentication="name" class="nav-email"></span>
                <form th:action="@{/auth/logout}" method="post" style="display:inline">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Đăng xuất</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="create-post-layout">
    <div class="create-post-card">
        <div class="create-post-header">
            <img th:src="'https://api.dicebear.com/7.x/initials/svg?seed=' + ${#authentication.name}"
                 class="create-avatar" alt="Avatar">
            <div>
                <h2>Đăng bài viết mới ✏️</h2>
                <p>Bài viết sẽ hiển thị với tất cả thành viên</p>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!--
            🛡️ LƯU Ý BẢO MẬT:
            - @PreAuthorize("isAuthenticated()") trong PostService bảo vệ method
            - CSRF token tự động được thêm bởi Thymeleaf
            - Chỉ user đã đăng nhập mới thấy trang này (SecurityConfig)
        -->
        <form th:action="@{/post/create}" method="post" id="postForm">
            <div class="form-group">
                <textarea id="content" name="content"
                          class="form-textarea"
                          placeholder="Bạn đang nghĩ gì? Chia sẻ kinh nghiệm Spring Security của bạn... 💭"
                          rows="6" maxlength="1000" required
                          oninput="updateCounter(this)"></textarea>
                <div class="char-counter">
                    <span id="charCount">0</span>/1000 ký tự
                </div>
            </div>

            <div class="post-options">
                <div class="post-option-item">
                    <span>👁️ Độ hiển thị:</span>
                    <select name="visibility" class="form-select-sm">
                        <option value="PUBLIC">🌍 Công khai</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/home}" class="btn btn-outline">← Hủy</a>
                <button type="submit" class="btn btn-primary" id="publishBtn">
                    🚀 Đăng bài viết
                </button>
            </div>
        </form>

        <!-- Security info -->
        <div class="security-notice">
            <p>🛡️ Bài viết được bảo vệ bởi <strong>CSRF Token</strong>.
                Phương thức <strong>@PreAuthorize("isAuthenticated()")</strong>
                đảm bảo chỉ user đã xác thực mới có thể đăng bài.</p>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
function updateCounter(textarea) {
    document.getElementById('charCount').textContent = textarea.value.length;
}
</script>
</body>
</html>
