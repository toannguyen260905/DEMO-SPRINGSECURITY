# ================================================
# SocialConnect - Cấu hình ứng dụng
# ================================================

spring.application.name=SocialConnect

# ---- Server ----
server.port=8080

# ---- H2 In-Memory Database (không cần cài gì thêm) ----
spring.datasource.url=jdbc:h2:mem:socialdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- H2 Console (chỉ dùng khi dev) ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- SQL initialization ----
spring.sql.init.mode=always

# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ---- Logging ----
logging.level.org.springframework.security=DEBUG
logging.level.com.social.anti=DEBUG
