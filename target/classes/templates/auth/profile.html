<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Profile | SocialConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="app-body">

<nav class="navbar">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand"><span>🛡️</span> SocialConnect</a>
        <div class="nav-links">
            <a th:href="@{/home}" class="nav-link">🏠 Feed</a>
            <a th:href="@{/auth/profile}" class="nav-link active">👤 Profile</a>
            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <button type="submit" class="btn btn-sm btn-outline-danger">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div style="max-width: 700px; margin: 40px auto; padding: 0 16px;">
    <div class="auth-profile-card" th:if="${user != null}">
        <div style="display:flex; gap:20px; align-items:center; margin-bottom:28px;">
            <img th:src="${user.avatarUrl != null ? user.avatarUrl : 'https://api.dicebear.com/7.x/initials/svg?seed=' + user.fullName}"
                 style="width:80px; height:80px; border-radius:50%; border:3px solid #6366f1;" alt="Avatar">
            <div>
                <h1 style="font-size:1.5rem; font-weight:800;" th:text="${user.fullName}">Name</h1>
                <p style="color:#94a3b8;" th:text="${user.email}">email</p>
                <div class="role-tags" style="margin-top:8px;">
                    <th:block th:each="role : ${user.roles}">
                        <span th:class="${role.name == 'ROLE_ADMIN' ? 'role-tag admin' : 'role-tag user'}"
                              th:text="${role.displayName}">Role</span>
                    </th:block>
                </div>
            </div>
        </div>

        <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:20px; margin-bottom:20px;">
            <h3 style="font-size:0.9rem; color:#94a3b8; margin-bottom:16px; font-weight:600;">📋 Thông tin xác thực (Authentication Object)</h3>
            <div style="display:flex; flex-direction:column; gap:10px; font-size:0.875rem;">
                <div style="display:flex; gap:16px;">
                    <span style="color:#64748b; min-width:140px;">Principal (Name):</span>
                    <code style="color:#818cf8;" sec:authentication="name"></code>
                </div>
                <div style="display:flex; gap:16px;">
                    <span style="color:#64748b; min-width:140px;">Authorities:</span>
                    <code style="color:#818cf8;" sec:authentication="authorities"></code>
                </div>
                <div style="display:flex; gap:16px;">
                    <span style="color:#64748b; min-width:140px;">Authenticated:</span>
                    <code style="color:#10b981;">true</code>
                </div>
                <div style="display:flex; gap:16px;">
                    <span style="color:#64748b; min-width:140px;">Account locked:</span>
                    <code th:style="${user.accountNonLocked ? 'color:#10b981' : 'color:#ef4444'}"
                          th:text="${user.accountNonLocked ? 'false (không bị khóa)' : 'true (BỊ KHÓA)'}">Status</code>
                </div>
                <div style="display:flex; gap:16px;">
                    <span style="color:#64748b; min-width:140px;">Member since:</span>
                    <code style="color:#818cf8;" th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd/MM/yyyy') : 'N/A'}">Date</code>
                </div>
            </div>
        </div>

        <div th:if="${user.bio}" style="color:#94a3b8; font-size:0.9rem; font-style:italic; margin-bottom:20px;"
             th:text="${user.bio}">Bio</div>

        <div style="display:flex; gap:12px;">
            <a th:href="@{/home}" class="btn btn-outline">← Về Feed</a>
            <sec:authorize access="hasRole('ADMIN')">
                <a th:href="@{/admin/dashboard}" class="btn btn-primary">⚙️ Admin Dashboard</a>
            </sec:authorize>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
