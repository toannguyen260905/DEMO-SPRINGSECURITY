<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' | SocialConnect' : 'SocialConnect'}">SocialConnect</title>
    <meta name="description" content="SocialConnect - Mạng xã hội demo Spring Security">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <th:block th:replace="${extraHead}"></th:block>
</head>
<body>

<!-- ── NAVBAR ─────────────────────────────────────────── -->
<nav class="navbar">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand">
            <span class="brand-icon">🛡️</span>
            <span class="brand-text">SocialConnect</span>
        </a>

        <div class="nav-links">
            <!-- Hiển thị khi ĐÃ đăng nhập | sec:authorize từ Spring Security -->
            <div sec:authorize="isAuthenticated()" class="nav-auth">
                <a th:href="@{/home}" class="nav-link">🏠 Feed</a>
                <a th:href="@{/post/create}" class="nav-link">✏️ Đăng bài</a>

                <!-- Chỉ hiện với ADMIN | sec:authorize="hasRole('ADMIN')" -->
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}" class="nav-link admin-link">
                    ⚙️ Admin
                </a>

                <div class="nav-user-info">
                    <img th:src="${#authentication.name != null ? 'https://api.dicebear.com/7.x/initials/svg?seed=' + #authentication.name : ''}"
                         class="nav-avatar" alt="Avatar">
                    <span sec:authentication="name" class="nav-username"></span>
                </div>

                <!-- CSRF Token tự động được thêm bởi Thymeleaf -->
                <form th:action="@{/auth/logout}" method="post" style="display:inline">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Đăng xuất</button>
                </form>
            </div>

            <!-- Hiển thị khi CHƯA đăng nhập -->
            <div sec:authorize="isAnonymous()" class="nav-guest">
                <a th:href="@{/auth/login}" class="btn btn-outline">Đăng nhập</a>
                <a th:href="@{/auth/register}" class="btn btn-primary">Đăng ký</a>
            </div>
        </div>
    </div>
</nav>

<!-- ── MAIN CONTENT ───────────────────────────────────── -->
<main class="main-content" th:replace="${content}">
    <!-- Content được inject vào đây -->
</main>

<!-- ── FOOTER ─────────────────────────────────────────── -->
<footer class="footer">
    <div class="footer-inner">
        <p>🛡️ <strong>SocialConnect</strong> — Demo Spring Security | MVC Architecture</p>
        <p class="footer-tech">Spring Boot · Spring Security · Thymeleaf · H2 Database · JPA</p>
    </div>
</footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
